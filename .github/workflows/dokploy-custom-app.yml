name: Dokploy Custom App Deploy (reusable)

# Reusable workflow for any "custom app" deployed via Dokploy on the
# innovspatial estate. Builds + pushes the GHCR image, triggers the
# Dokploy compose deploy via Tailscale, then verifies the live app
# is serving the new revision via the /ready endpoint.
#
# Caller pattern (in each app repo's .github/workflows/deploy.yml):
#
#   name: Build and Deploy
#   on: { push: { branches: [main] } }
#   jobs:
#     deploy:
#       uses: hemanth1986/gha-workflows/.github/workflows/dokploy-custom-app.yml@main
#       with:
#         app_host: biometric.innovspatial.app
#         ghcr_image: ghcr.io/hemanth1986/biometric-sync
#         # Optional, default '.' / 'package.json' — set when sources live in a subdir:
#         # build_context: ./glue
#         # version_file: glue/package.json
#       secrets: inherit
#
# Required secrets in caller repo:
#   DOKPLOY_API_TOKEN    — global Dokploy API key
#   DOKPLOY_COMPOSE_ID   — per-app compose ID
#   TS_OAUTH_CLIENT_ID   — Tailscale OAuth client (tag:ci)
#   TS_OAUTH_SECRET      — Tailscale OAuth secret
#
# /ready endpoint contract (every custom app MUST implement):
#   GET /ready -> 200 JSON
#   {"status":"ready","version":"<from package.json>","revision":"<APP_REVISION env>","timestamp":"<ISO8601>"}
# The revision MUST come from an APP_REVISION env baked at build time
# (this workflow passes it as a docker build-arg automatically).

on:
  workflow_call:
    inputs:
      app_host:
        description: "Public hostname (Traefik routes by this Host header). e.g. biometric.innovspatial.app"
        required: true
        type: string
      ghcr_image:
        description: "Full GHCR image path (no tag). e.g. ghcr.io/hemanth1986/biometric-sync"
        required: true
        type: string
      contabo_ts_ip:
        description: "Contabo's Tailscale IP — readiness curl is forced through here so DOCKER-USER allows it. Default is correct for the current estate; only override if Contabo is replaced."
        required: false
        type: string
        default: "100.83.140.7"
      verify_iterations:
        description: "Max poll iterations for verify step. 90 iterations × ~6-11s each = up to ~15 min, sized to cover slow/loaded deploys (e.g. a burst of simultaneous deploys on Contabo)."
        required: false
        type: number
        default: 90
      build_context:
        description: "Docker build context path (relative to repo root). Default '.' for repos with Dockerfile at the root."
        required: false
        type: string
        default: "."
      version_file:
        description: "Path to package.json to read the version from. Default 'package.json'."
        required: false
        type: string
        default: "package.json"
      smoke_compose_path:
        description: "Path (relative to repo root) to a docker-compose file that orchestrates a pre-deploy smoke test — boots the just-pushed image alongside any required sidecars (DB, etc.) with per-service healthchecks, so `docker compose up --wait` proves the image actually starts cleanly + reaches its dependencies before Dokploy is triggered. Each app owns its own compose file because the stacks are heterogeneous (Postgres / MariaDB / SQLite+sidecar / no-DB). The app service in the compose MUST be named `app` and use the env var `APP_IMAGE` for its image (this workflow injects it). Empty string disables smoke (default)."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: deploy-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read version from package.json
        id: version
        run: echo "version=$(jq -r .version "${{ inputs.version_file }}")" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.build_context }}
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            APP_REVISION=${{ github.sha }}
          tags: |
            ${{ inputs.ghcr_image }}:main
            ${{ inputs.ghcr_image }}:${{ steps.version.outputs.version }}
            ${{ inputs.ghcr_image }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pre-deploy smoke test (opt-in via smoke_compose_path)
        if: ${{ inputs.smoke_compose_path != '' }}
        env:
          # Compose file references ${APP_IMAGE} for the `app` service;
          # we point it at the immutable sha tag we just pushed so smoke
          # tests the exact bits the deploy will pull.
          APP_IMAGE: ${{ inputs.ghcr_image }}:sha-${{ github.sha }}
          COMPOSE_FILE: ${{ inputs.smoke_compose_path }}
        run: |
          set -e
          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "::error::smoke_compose_path '$COMPOSE_FILE' not found in repo"
            exit 1
          fi

          echo "Booting smoke stack from $COMPOSE_FILE with APP_IMAGE=$APP_IMAGE"
          # --wait blocks until every service with a healthcheck reports
          # healthy (or until --wait-timeout elapses). The `app` service in
          # the compose MUST declare a healthcheck that probes the right
          # endpoint (typically /ready for apps that probe their DB).
          # A 120s timeout covers cold-start + first-migration time on the
          # slowest stacks.
          set +e
          docker compose -f "$COMPOSE_FILE" up -d --wait --wait-timeout 120
          smoke_exit=$?
          set -e

          # Always dump logs so the operator can see WHAT failed (not
          # just THAT it failed). Grouped so the GHA UI collapses them
          # on success and expands on failure.
          echo "::group::smoke compose logs"
          docker compose -f "$COMPOSE_FILE" logs --no-color 2>&1 || true
          echo "::endgroup::"

          # Tear down (volumes too — smoke state must never leak between
          # runs, especially DB seed data).
          docker compose -f "$COMPOSE_FILE" down --volumes --remove-orphans 2>&1 | tail -10 || true

          if [ "$smoke_exit" -ne 0 ]; then
            echo "::error::Smoke test failed (exit=$smoke_exit) — image $APP_IMAGE cannot start cleanly. Deploy aborted."
            exit "$smoke_exit"
          fi
          echo "✓ Smoke test passed — proceeding to deploy"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Enforce Dokploy custom-app mode (autoDeploy=false)
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          compose=$(curl -fsS \
            -H "x-api-key: $DOKPLOY_API_TOKEN" \
            "http://${{ inputs.contabo_ts_ip }}:3000/api/compose.one?composeId=$DOKPLOY_COMPOSE_ID")
          auto_deploy=$(echo "$compose" | jq -r '.autoDeploy')
          if [ "$auto_deploy" != "false" ]; then
            echo "Dokploy autoDeploy is $auto_deploy; disabling for GitHub-Actions-owned deploys"
            payload=$(jq -n --arg composeId "$DOKPLOY_COMPOSE_ID" \
              '{composeId: $composeId, autoDeploy: false}')
            curl -fsS -X POST \
              -H "Content-Type: application/json" \
              -H "x-api-key: $DOKPLOY_API_TOKEN" \
              -d "$payload" \
              "http://${{ inputs.contabo_ts_ip }}:3000/api/compose.update" >/dev/null
          fi

      - name: Trigger Dokploy deploy
        id: deploy-trigger
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
        run: |
          triggered_at=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          echo "triggered_at=$triggered_at" >> "$GITHUB_OUTPUT"

          # Capture the previous successful deployment for diagnostics on
          # failure. Both the deploymentId (Dokploy's internal record) and
          # the commit sha (extracted from the deployment title set by
          # this workflow at line ~157: "GitHub Actions <sha>") are
          # exposed as outputs so the failure-message step can guide the
          # operator to the correct revert target.
          previous_done_json=$(curl -fsS \
            -H "x-api-key: $DOKPLOY_API_TOKEN" \
            "http://${{ inputs.contabo_ts_ip }}:3000/api/deployment.allByCompose?composeId=$DOKPLOY_COMPOSE_ID" \
            | jq -c --arg triggered_at "$triggered_at" \
              '[.[] | select(.status == "done" and .createdAt < $triggered_at)] | sort_by(.createdAt) | reverse | .[0] // {}')
          previous_done_id=$(echo "$previous_done_json" | jq -r '.deploymentId // ""')
          previous_done_sha=$(echo "$previous_done_json" | jq -r '.title // ""' | grep -oE '[a-f0-9]{40}' | head -1)
          echo "previous_done_deployment_id=$previous_done_id" >> "$GITHUB_OUTPUT"
          echo "previous_done_sha=$previous_done_sha" >> "$GITHUB_OUTPUT"

          payload=$(jq -n \
            --arg composeId "$DOKPLOY_COMPOSE_ID" \
            --arg title "GitHub Actions ${GITHUB_SHA}" \
            --arg description "Run ${GITHUB_RUN_ID}: image already pushed to GHCR before this deploy" \
            '{composeId: $composeId, title: $title, description: $description}')
          body_file=$(mktemp)
          http_code=$(curl -sS -o "$body_file" -w "%{http_code}" -X POST \
            "http://${{ inputs.contabo_ts_ip }}:3000/api/compose.deploy" \
            -H 'Content-Type: application/json' \
            -H "x-api-key: $DOKPLOY_API_TOKEN" \
            -d "$payload")
          body=$(cat "$body_file")
          echo "Response: $body"
          echo "HTTP Status: $http_code"
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Deploy trigger failed with HTTP $http_code"
            exit 1
          fi
          echo "Deploy triggered successfully"

      - name: Verify deploy succeeded
        env:
          DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          TRIGGERED_AT: ${{ steps.deploy-trigger.outputs.triggered_at }}
          APP_HOST: ${{ inputs.app_host }}
          CONTABO_TS_IP: ${{ inputs.contabo_ts_ip }}
          EXPECTED_REVISION: ${{ github.sha }}
          MAX_ITERATIONS: ${{ inputs.verify_iterations }}
        run: |
          # Two-tier verification:
          #   STRONG (preferred): curl the app's /ready endpoint and match
          #     .revision against $GITHUB_SHA. Proves the new code is
          #     serving HTTP. Requires the Tailscale ACL to allow tag:ci
          #     to reach Contabo on port 443.
          #   FALLBACK: trust Dokploy's deployment.allByCompose status.
          #     "done" means container started, health check passed.
          #     Used when /ready is unreachable from CI (e.g. Tailscale
          #     ACL only opens 3000 for tag:ci, not 443).
          # Workflow fails ONLY if Dokploy reports "error" OR neither
          # signal arrives within the iteration budget.
          echo "Polling live $APP_HOST/ready (strong) + Dokploy status (fallback)..."
          last_status="no deployment record yet"
          ready_ever_reachable=false
          dokploy_done=false
          dokploy_done_id=""
          for i in $(seq 1 "$MAX_ITERATIONS"); do
            # --resolve forces TCP to Contabo's Tailscale IP. Traefik
            # routes by Host header, cert validates by SNI, DOCKER-USER
            # allows the Tailscale source. Times out (~6s) if the
            # Tailscale ACL doesn't allow port 443 for tag:ci.
            READY_RESPONSE=$(curl -fsS --max-time 6 \
              --resolve "$APP_HOST:443:$CONTABO_TS_IP" \
              "https://$APP_HOST/ready?revision=$EXPECTED_REVISION" 2>/dev/null || true)
            READY_REVISION=$(echo "$READY_RESPONSE" | jq -r '.revision // empty' 2>/dev/null || true)
            if [ -n "$READY_REVISION" ]; then
              ready_ever_reachable=true
              if [ "$READY_REVISION" = "$EXPECTED_REVISION" ]; then
                echo "STRONG OK -- live revision matches: $READY_REVISION"
                exit 0
              fi
            fi

            RESPONSE=$(curl -s --max-time 15 \
              -H "x-api-key: $DOKPLOY_API_TOKEN" \
              "http://$CONTABO_TS_IP:3000/api/deployment.allByCompose?composeId=$DOKPLOY_COMPOSE_ID" || echo '[]')
            DEPLOYMENT=$(echo "$RESPONSE" | jq -c --arg triggered_at "$TRIGGERED_AT" '
              if type == "array" then
                [.[] | select(.createdAt >= $triggered_at)] | sort_by(.createdAt) | reverse | .[0] // empty
              else
                empty
              end
            ')

            # Make MISMATCH explicit in the per-iter log. Without this,
            # "saw revisions but none matched" only shows up in the final
            # failure summary — operators couldn't tell at a glance
            # whether /ready was unreachable (network/Tailscale issue)
            # vs. reachable but returning the OLD container's revision
            # (compose rolling-update race, old container still draining
            # within stop_grace_period).
            if [ -n "$READY_REVISION" ] && [ "$READY_REVISION" != "$EXPECTED_REVISION" ]; then
              ready_label="$READY_REVISION (MISMATCH — want $EXPECTED_REVISION)"
            elif [ -n "$READY_REVISION" ]; then
              ready_label="$READY_REVISION"
            else
              ready_label="unavailable"
            fi

            if [ -z "$DEPLOYMENT" ]; then
              echo "[$i/$MAX_ITERATIONS] Ready revision: $ready_label; $last_status"
              sleep 5
              continue
            fi

            DEPLOYMENT_ID=$(echo "$DEPLOYMENT" | jq -r '.deploymentId')
            STATUS=$(echo "$DEPLOYMENT" | jq -r '.status')
            last_status="deployment $DEPLOYMENT_ID status: $STATUS"
            echo "[$i/$MAX_ITERATIONS] Ready revision: $ready_label; $last_status"
            case "$STATUS" in
              error)
                ERROR=$(echo "$DEPLOYMENT" | jq -r '.errorMessage // "check Dokploy logs"')
                echo "::error::Deploy failed: $ERROR"
                exit 1
                ;;
              done)
                dokploy_done=true
                dokploy_done_id="$DEPLOYMENT_ID"
                # Don't exit yet. Dokploy fires "done" when
                # `docker compose up -d` returns + healthcheck passes
                # once, BEFORE Traefik's load balancer has finished
                # migrating to the new container. With single-replica
                # compose + stop_grace_period: 30s, the old container
                # can still answer /ready (with the OLD revision) for
                # a while after "done".
                #
                # Fall back to trusting "done" (exit 0 after the loop)
                # ONLY when /ready is unreachable — then the strong
                # check is impossible and "done" is all we have. If
                # /ready IS reachable but still stale, keep polling so
                # the new container can take over (the STRONG check at
                # the top exits 0 the moment .revision matches); a
                # persistent mismatch then fails loudly after the full
                # budget — a real "running old code" signal, not a
                # 50s rolling-update drain race.
                if [ "$ready_ever_reachable" = "false" ] && [ "$i" -ge 10 ]; then
                  break
                fi
                ;;
            esac
            sleep 5
          done

          if [ "$dokploy_done" = "true" ]; then
            if [ "$ready_ever_reachable" = "true" ]; then
              echo "::error::Dokploy reports done ($dokploy_done_id) but /ready never returned $EXPECTED_REVISION (saw revisions but none matched). The new container may be running OLD code, or APP_REVISION env wasn't passed at build time."
              echo "Last /ready response: $(echo "$READY_RESPONSE" | head -c 500)"
              exit 1
            else
              echo "::warning::FALLBACK OK -- /ready unreachable from CI (likely Tailscale ACL blocks tag:ci on port 443), trusting Dokploy 'done' for deployment $dokploy_done_id. To enable the strong check, allow tag:ci -> Contabo:443 in the Tailscale ACL."
              exit 0
            fi
          fi

          echo "::error::Neither /ready confirmation nor Dokploy 'done' status arrived within $MAX_ITERATIONS iterations"
          echo "Last Dokploy status: $last_status"
          echo "Last /ready response: $(echo "$READY_RESPONSE" | head -c 500)"
          exit 1

      - name: Deploy failed — manual recovery required
        if: failure()
        env:
          EXPECTED_SHA: ${{ github.sha }}
          PREVIOUS_SHA: ${{ steps.deploy-trigger.outputs.previous_done_sha }}
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.deploy-trigger.outputs.previous_done_deployment_id }}
        run: |
          # Dokploy's `rollback.rollback` endpoint operates on
          # APPLICATION-level rollback snapshots (single-container apps
          # with rollback explicitly enabled). Compose-based apps NEVER
          # get a rollbackId — confirmed by inspecting deployment.allByCompose:
          # every entry has rollbackId: null. The prior version of this
          # step sent a deploymentId to that endpoint, got HTTP 400
          # "Error input: Rolling back", and silently echoed
          # "Rolled back to deployment: ..." anyway because the echo
          # ran unconditionally. NOTHING WAS EVER ROLLED BACK.
          #
          # Phase 4 of the deploy-hardening plan will add a real rollback
          # (compose.update APP_REVISION env to previous sha, then
          # compose.deploy). Until then, fail loudly with the info the
          # operator needs to recover by hand.
          echo "::error::Deploy of $EXPECTED_SHA failed and was NOT auto-rolled back."
          echo ""
          echo "Compose-based Dokploy apps have no native rollback feature."
          echo "Recover manually:"
          echo ""
          if [ -n "$PREVIOUS_SHA" ]; then
            echo "  Previous successful revision: $PREVIOUS_SHA"
            echo "  Previous Dokploy deployment ID: $PREVIOUS_DEPLOYMENT_ID"
            echo ""
            echo "  Option A (clean — recommended):"
            echo "    cd <repo> && git revert $EXPECTED_SHA && git push origin main"
            echo ""
            echo "  Option B (force-reset, only if no other commits have landed since):"
            echo "    cd <repo> && git reset --hard $PREVIOUS_SHA && git push --force-with-lease origin main"
          else
            echo "  No previous successful deployment found in Dokploy history."
            echo "  Check Dokploy UI for an earlier good revision, or roll back"
            echo "  via the docker-compose.yml image tag override."
          fi
